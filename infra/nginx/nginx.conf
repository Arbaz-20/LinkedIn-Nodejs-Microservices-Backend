upstream auth          { server auth-service:3001; }
upstream api_gateway   { server api-gateway:3000; }

server {
  listen 80;
  server_name _;

  client_max_body_size 12m;

  # Health
  location = /health {
    return 200 'ok';
    add_header Content-Type text/plain;
  }

  # Auth — public, no JWT required (forwarded straight to auth-service)
  location /api/auth/ {
    proxy_pass http://auth/api/auth/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Everything else — through api-gateway for JWT verification + routing
  location /api/ {
    proxy_pass http://api_gateway/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
