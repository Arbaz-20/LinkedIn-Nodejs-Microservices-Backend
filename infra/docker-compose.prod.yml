# Production override — layered on top of docker-compose.yml:
#   docker compose -f infra/docker-compose.yml -f infra/docker-compose.prod.yml up -d
#
# What it changes for production:
#   • Pins every service to a pre-built image in the registry (GHCR) instead of
#     building locally — set IMAGE_PREFIX + IMAGE_TAG so `docker compose pull` works.
#   • Adds log rotation (json-file, capped) so containers can't fill the disk.
#   • Adds CPU/memory limits (honored by `docker compose` in non-swarm mode).
#
# Note: published host ports from the base file remain (Compose merges port lists
# and cannot remove them via an override). In a real deployment, run behind a
# firewall / private network and expose only nginx (:80) publicly.

x-logging: &prod-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-app-deploy: &app-deploy
  deploy:
    resources:
      limits:
        cpus: "0.75"
        memory: 512M
      reservations:
        memory: 128M

services:
  # ─── Infrastructure ────────────────────────────────
  nginx:
    <<: *prod-logging

  postgres:
    <<: *prod-logging
    deploy:
      resources:
        limits:
          memory: 1G

  rabbitmq:
    <<: *prod-logging
    deploy:
      resources:
        limits:
          memory: 768M

  redis:
    <<: *prod-logging
    deploy:
      resources:
        limits:
          memory: 256M

  elasticsearch:
    <<: *prod-logging
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    deploy:
      resources:
        limits:
          memory: 2G

  minio:
    <<: *prod-logging
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Services ──────────────────────────────────────
  api-gateway:
    <<: [*prod-logging, *app-deploy]
    image: ${IMAGE_PREFIX:-ghcr.io/your-org/linkedin-clone}/api-gateway:${IMAGE_TAG:-latest}

  auth-service:
    <<: [*prod-logging, *app-deploy]
    image: ${IMAGE_PREFIX:-ghcr.io/your-org/linkedin-clone}/auth-service:${IMAGE_TAG:-latest}

  user-service:
    <<: [*prod-logging, *app-deploy]
    image: ${IMAGE_PREFIX:-ghcr.io/your-org/linkedin-clone}/user-service:${IMAGE_TAG:-latest}

  connection-service:
    <<: [*prod-logging, *app-deploy]
    image: ${IMAGE_PREFIX:-ghcr.io/your-org/linkedin-clone}/connection-service:${IMAGE_TAG:-latest}

  post-service:
    <<: [*prod-logging, *app-deploy]
    image: ${IMAGE_PREFIX:-ghcr.io/your-org/linkedin-clone}/post-service:${IMAGE_TAG:-latest}

  messaging-service:
    <<: [*prod-logging, *app-deploy]
    image: ${IMAGE_PREFIX:-ghcr.io/your-org/linkedin-clone}/messaging-service:${IMAGE_TAG:-latest}

  notification-service:
    <<: [*prod-logging, *app-deploy]
    image: ${IMAGE_PREFIX:-ghcr.io/your-org/linkedin-clone}/notification-service:${IMAGE_TAG:-latest}

  search-service:
    <<: [*prod-logging, *app-deploy]
    image: ${IMAGE_PREFIX:-ghcr.io/your-org/linkedin-clone}/search-service:${IMAGE_TAG:-latest}

  media-service:
    <<: [*prod-logging, *app-deploy]
    image: ${IMAGE_PREFIX:-ghcr.io/your-org/linkedin-clone}/media-service:${IMAGE_TAG:-latest}

  job-service:
    <<: [*prod-logging, *app-deploy]
    image: ${IMAGE_PREFIX:-ghcr.io/your-org/linkedin-clone}/job-service:${IMAGE_TAG:-latest}
