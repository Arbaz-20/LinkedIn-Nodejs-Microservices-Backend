name: linkedin-clone

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - linkedin-net
  depends_on:
    rabbitmq:
      condition: service_healthy
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:
  # ─── Infrastructure ────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-gateway
      - auth-service
    networks:
      - linkedin-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: linkedin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: linkedin
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      # Host 5544 → container 5432: a native Postgres may already own host 5432.
      # Container networking still uses 5432.
      - "5544:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkedin"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - linkedin-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: linkedin
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      # Host 5673 → container 5672: host port 5672 is inside a Windows reserved
      # exclusion range on some dev machines. Container networking still uses 5672.
      - "5800:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - linkedin-net

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - linkedin-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"\\(green\\|yellow\\)\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - linkedin-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - linkedin-net

  # ─── Services ──────────────────────────────────────
  api-gateway:
    <<: *service-defaults
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      CONNECTION_SERVICE_URL: http://connection-service:3003
      POST_SERVICE_URL: http://post-service:3004
      MESSAGING_SERVICE_URL: http://messaging-service:3005
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
      SEARCH_SERVICE_URL: http://search-service:3007
      MEDIA_SERVICE_URL: http://media-service:3008
      JOB_SERVICE_URL: http://job-service:3009

  auth-service:
    <<: *service-defaults
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://linkedin:${POSTGRES_PASSWORD}@postgres:5432/auth_db
      RABBITMQ_URL: amqp://linkedin:${RABBITMQ_PASSWORD}@rabbitmq:5672
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CLIENT_URL: ${CLIENT_URL}

  user-service:
    <<: *service-defaults
    build:
      context: ..
      dockerfile: services/user-service/Dockerfile
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://linkedin:${POSTGRES_PASSWORD}@postgres:5432/user_db
      RABBITMQ_URL: amqp://linkedin:${RABBITMQ_PASSWORD}@rabbitmq:5672
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379

  connection-service:
    <<: *service-defaults
    build:
      context: ..
      dockerfile: services/connection-service/Dockerfile
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: postgresql://linkedin:${POSTGRES_PASSWORD}@postgres:5432/connection_db
      RABBITMQ_URL: amqp://linkedin:${RABBITMQ_PASSWORD}@rabbitmq:5672
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379

  post-service:
    <<: *service-defaults
    build:
      context: ..
      dockerfile: services/post-service/Dockerfile
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: production
      PORT: 3004
      DATABASE_URL: postgresql://linkedin:${POSTGRES_PASSWORD}@postgres:5432/post_db
      RABBITMQ_URL: amqp://linkedin:${RABBITMQ_PASSWORD}@rabbitmq:5672
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CONNECTION_SERVICE_URL: http://connection-service:3003

  messaging-service:
    <<: *service-defaults
    build:
      context: ..
      dockerfile: services/messaging-service/Dockerfile
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: production
      PORT: 3005
      DATABASE_URL: postgresql://linkedin:${POSTGRES_PASSWORD}@postgres:5432/messaging_db
      RABBITMQ_URL: amqp://linkedin:${RABBITMQ_PASSWORD}@rabbitmq:5672
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379

  notification-service:
    <<: *service-defaults
    build:
      context: ..
      dockerfile: services/notification-service/Dockerfile
    ports:
      - "3006:3006"
    environment:
      NODE_ENV: production
      PORT: 3006
      DATABASE_URL: postgresql://linkedin:${POSTGRES_PASSWORD}@postgres:5432/notification_db
      RABBITMQ_URL: amqp://linkedin:${RABBITMQ_PASSWORD}@rabbitmq:5672
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}

  search-service:
    <<: *service-defaults
    build:
      context: ..
      dockerfile: services/search-service/Dockerfile
    ports:
      - "3007:3007"
    environment:
      NODE_ENV: production
      PORT: 3007
      ELASTICSEARCH_URL: http://elasticsearch:9200
      RABBITMQ_URL: amqp://linkedin:${RABBITMQ_PASSWORD}@rabbitmq:5672
    depends_on:
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  media-service:
    <<: *service-defaults
    build:
      context: ..
      dockerfile: services/media-service/Dockerfile
    ports:
      - "3008:3008"
    environment:
      NODE_ENV: production
      PORT: 3008
      DATABASE_URL: postgresql://linkedin:${POSTGRES_PASSWORD}@postgres:5432/media_db
      RABBITMQ_URL: amqp://linkedin:${RABBITMQ_PASSWORD}@rabbitmq:5672
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: uploads
      # Client-reachable base URL for stored objects (browsers can't resolve "minio")
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}

  job-service:
    <<: *service-defaults
    build:
      context: ..
      dockerfile: services/job-service/Dockerfile
    ports:
      - "3009:3009"
    environment:
      NODE_ENV: production
      PORT: 3009
      DATABASE_URL: postgresql://linkedin:${POSTGRES_PASSWORD}@postgres:5432/job_db
      RABBITMQ_URL: amqp://linkedin:${RABBITMQ_PASSWORD}@rabbitmq:5672
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:
  es-data:
  minio-data:

networks:
  linkedin-net:
    driver: bridge
